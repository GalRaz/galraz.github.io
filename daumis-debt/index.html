<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Daumi's Debt</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <!-- Auth screen -->
    <div id="screen-auth" class="screen">
      <div class="auth-container">
        <h1>Daumi's Debt</h1>
        <p class="subtitle">Expense tracker for two</p>
        <button id="btn-google-login" class="btn btn-primary">Sign in with Google</button>
      </div>
    </div>

    <!-- Home screen -->
    <div id="screen-dashboard" class="screen">
      <div class="dashboard-content">
        <div id="balance-display" class="balance-card" style="cursor:pointer">
          <p class="balance-label">Loading...</p>
          <p class="balance-amount"></p>
          <div id="balance-breakdown" class="balance-breakdown hidden"></div>
          <p class="balance-hint hidden" id="balance-hint">tap to toggle currencies</p>
        </div>
        <div id="duel-banner" class="duel-banner hidden">
          <p>Weekly Duel available!</p>
          <button id="btn-play-duel" class="btn btn-accent">Play</button>
        </div>
        <h3>History</h3>
        <ul id="history-list" class="history-list"></ul>
      </div>
      <button id="fab-add" class="fab">+</button>
    </div>

    <!-- Add entry screen -->
    <div id="screen-add" class="screen">
      <div class="screen-header">
        <button id="btn-back" class="btn-icon">&larr;</button>
        <h2 id="add-title">Add Expense</h2>
      </div>
      <div class="toggle-group">
        <div class="toggle" id="entry-type">
          <button type="button" class="toggle-btn active" data-value="expense">Expense</button>
          <button type="button" class="toggle-btn" data-value="payment">Settle up</button>
        </div>
      </div>
      <form id="form-entry" class="form">
        <input type="text" id="entry-desc" placeholder="What was it for?">
        <div class="row">
          <input type="number" id="entry-amount" placeholder="Amount" step="0.01" inputmode="decimal" required>
          <select id="entry-currency">
            <option value="USD">$ USD</option>
            <option value="EUR">€ EUR</option>
            <option value="GBP">£ GBP</option>
            <option value="JPY">¥ JPY</option>
            <option value="THB">฿ THB</option>
            <option value="BTN">Nu BTN</option>
            <option value="TWD">NT$ TWD</option>
            <option value="KRW">₩ KRW</option>
            <option value="CNY">¥ CNY</option>
            <option value="INR">₹ INR</option>
            <option value="AUD">A$ AUD</option>
            <option value="CAD">C$ CAD</option>
            <option value="CHF">Fr CHF</option>
            <option value="SGD">S$ SGD</option>
            <option value="HKD">HK$ HKD</option>
            <option value="NZD">NZ$ NZD</option>
            <option value="SEK">kr SEK</option>
            <option value="NOK">kr NOK</option>
            <option value="DKK">kr DKK</option>
            <option value="MXN">$ MXN</option>
            <option value="BRL">R$ BRL</option>
            <option value="PLN">zł PLN</option>
            <option value="CZK">Kč CZK</option>
            <option value="HUF">Ft HUF</option>
            <option value="ILS">₪ ILS</option>
            <option value="TRY">₺ TRY</option>
            <option value="ZAR">R ZAR</option>
            <option value="PHP">₱ PHP</option>
            <option value="MYR">RM MYR</option>
            <option value="IDR">Rp IDR</option>
          </select>
        </div>
        <div id="expense-options" class="toggle-group">
          <label>How to split</label>
          <div class="split-options" id="entry-split-options">
            <button type="button" class="split-option active" data-paid="self" data-split="even">You paid, split equally</button>
            <button type="button" class="split-option" data-paid="self" data-split="full">You are owed the full amount</button>
            <button type="button" class="split-option" data-paid="partner" data-split="even"><span class="partner-name">Partner</span> paid, split equally</button>
            <button type="button" class="split-option" data-paid="partner" data-split="full"><span class="partner-name">Partner</span> is owed the full amount</button>
          </div>
        </div>
        <div id="payment-direction" class="toggle-group" style="display:none">
          <label>Who paid</label>
          <div class="toggle" id="entry-paid-by">
            <button type="button" class="toggle-btn active" data-value="self">I paid</button>
            <button type="button" class="toggle-btn" data-value="partner"><span class="partner-name">Partner</span> paid</button>
          </div>
        </div>
        <input type="date" id="entry-date">
        <div id="recurring-group" class="toggle-group">
          <label>Recurring</label>
          <div class="toggle" id="entry-recurring">
            <button type="button" class="toggle-btn active" data-value="none">One-time</button>
            <button type="button" class="toggle-btn" data-value="weekly">Weekly</button>
            <button type="button" class="toggle-btn" data-value="monthly">Monthly</button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary">Save</button>
      </form>
    </div>

    <!-- Duel screen -->
    <div id="screen-duel" class="screen">
      <div class="screen-header">
        <button id="btn-back-duel" class="btn-icon">&larr;</button>
        <h2>Weekly Duel</h2>
      </div>
      <div id="duel-content"></div>
    </div>
  </div>

  <!-- Firebase SDK (compat for no-build-step usage) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
